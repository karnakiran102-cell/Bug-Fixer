version: "3.8"

services:
  # ========================================================================
  # PostgreSQL Database
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: projects-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projects_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projects-network

  # ========================================================================
  # Redis - Message Queue & Cache
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: projects-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projects-network

  # ========================================================================
  # FastAPI Web Server
  # ========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: projects-web
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projects_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
      REPO_BASE_PATH: /data/repos
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - projects_repos:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - projects-network

  # ========================================================================
  # Celery Worker - Git Operations
  # ========================================================================
  celery-worker-git:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: projects-celery-git
    command: celery -A projects.celery_app worker -l info -Q git_ops --concurrency=2
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projects_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REPO_BASE_PATH: /data/repos
    volumes:
      - ./src:/app/src
      - projects_repos:/data/repos
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - projects-network

  # ========================================================================
  # Celery Worker - Webhooks
  # ========================================================================
  celery-worker-webhooks:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: projects-celery-webhooks
    command: celery -A projects.celery_app worker -l info -Q webhooks --concurrency=4
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projects_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - projects-network

  # ========================================================================
  # Celery Beat - Scheduled Tasks
  # ========================================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: projects-celery-beat
    command: celery -A projects.celery_app beat -l info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projects_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
    networks:
      - projects-network

  # ========================================================================
  # Flower - Celery Monitoring
  # ========================================================================
  flower:
    image: mher/flower
    container_name: projects-flower
    command: celery --broker=redis://redis:6379 flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - projects-network

  # ========================================================================
  # Nginx - Reverse Proxy & Load Balancer
  # ========================================================================
  nginx:
    image: nginx:alpine
    container_name: projects-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - projects-network

volumes:
  postgres_data:
  redis_data:
  projects_repos:

networks:
  projects-network:
    driver: bridge
